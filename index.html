*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F2;--surface:#FFFFFF;--surf:#FFFFFF;--card:#FFFFFF;--surface-2:#F0EDE8;

  --accent:#D4914A;--acc:#D4914A;
  --text:#1A1512;--txt:#1A1512;--text-secondary:#6B5E52;--muted:#9E8E82;
  --danger:#C0392B;--err:#C0392B;--danger-light:#FDECEB;
  --success:#2D7A44;--ok:#2D7A44;--success-light:#EBF5EE;
  --warning:#B8751A;--warn:#B8751A;--warning-light:#FEF3E2;
  --info:#1A5FAD;--info-light:#EBF2FD;

body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;display:flex;font-weight:400}
a{color:var(--pri);text-decoration:none}
#sb{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:.3s;overflow:hidden}

#sb .logo span{font-family:'Inter',sans-serif;font-weight:800;font-size:17px;color:var(--primary);letter-spacing:0.02em}
#sb nav{flex:1;padding:10px 10px;overflow-y:auto;min-height:0}

#sb nav a:hover{background:var(--surface-2);color:var(--txt)}

#main{margin-left:220px;flex:1;padding:20px;min-height:100vh;background:var(--bg)}
.topbar{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar .logo-m{display:flex;align-items:center;gap:8px}
.topbar .logo-m .icon{width:34px;height:34px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;}
.topbar .logo-m span{font-family:'Inter',sans-serif;font-weight:800;font-size:16px;color:var(--primary)}
#bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding:4px 0}
#bnav .bn{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;padding:6px 4px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;transition:.15s}
#bnav .bn:hover,#bnav .bn.act{color:var(--pri)}
#bnav .bn span:first-child{font-size:20px}
@media(max-width:768px){

  .topbar{display:flex}#bnav{display:flex}
}
.pg{display:none}.pg.show{display:block}
.row{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;flex:1;min-width:130px;box-shadow:var(--shadow-sm)}
.kpi .val{font-size:28px;font-weight:800;color:var(--pri)}
.kpi .lbl{color:var(--muted);font-size:12px;margin-top:4px;font-weight:600}
.kpi.warn .val{color:var(--acc)} .kpi.acc .val{color:var(--ok)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.card h3{font-size:12px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;background:var(--surface-2)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--txt)}
tr:hover td{background:var(--card-hover)}
tr:last-child td{border:0}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-ok{background:var(--success-light);color:var(--ok)}
.b-warn{background:var(--warning-light);color:var(--warn)}
.b-err{background:var(--danger-light);color:var(--err)}
.b-info{background:var(--info-light);color:var(--info)}
.b-gray{background:var(--surface-2);color:var(--muted)}
.b-acc{background:#FBF0E5;color:var(--acc)}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn-pri{background:var(--pri);color:#fff} .btn-pri:hover{background:var(--primary-dark)}
.btn-acc{background:var(--acc);color:#fff} .btn-acc:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)} .btn-ghost:hover{color:var(--txt);background:var(--surface-2)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-wa{background:#25D366;color:#fff} .btn-wa:hover{opacity:.9}
.btn-err{background:var(--danger-light);color:var(--err);border:1px solid rgba(192,57,43,0.2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.frow.full{grid-template-columns:1fr}
@media(max-width:500px){.frow{grid-template-columns:1fr}}
label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;background:#fff;border:1.5px solid var(--border);color:var(--txt);padding:9px 12px;border-radius:8px;font-size:13px;outline:none;transition:.15s;font-family:'Inter',sans-serif}
input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(63,122,95,0.1)}
textarea{resize:vertical;min-height:60px}
.overlay{display:none;position:fixed;inset:0;background:rgba(26,21,18,.4);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:#fff;border:none;border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-md)}
.modal h2{font-size:18px;font-weight:800;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);color:var(--txt)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.search-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-bar input{max-width:260px}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab{padding:8px 16px;cursor:pointer;border-radius:8px 8px 0 0;color:var(--muted);font-size:13px;border-bottom:2px solid transparent;transition:.15s;font-weight:600;background:none}
.tab.act{color:var(--pri);border-bottom-color:var(--pri)}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:13px}
.alert-warn{background:var(--warning-light);border-left:3px solid var(--acc)}
.alert-err{background:var(--danger-light);border-left:3px solid var(--err);color:var(--err)}
@media print{
  #sb,#bnav,.topbar,.btn,.no-print{display:none!important}
  #main{margin:0;padding:0}
  .modal,.overlay{position:static;display:block!important;background:white;color:black;max-height:none}

.notif-badge{background:#ef4444;color:#fff;font-size:10px;border-radius:999px;padding:2px 6px;margin-left:auto;font-weight:700}
.sec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}

.err-note{color:var(--err);font-size:12px;font-weight:700;background:var(--danger-light);padding:6px 10px;border-radius:8px;margin-bottom:8px}
hr{border:0;border-top:1px solid var(--border);margin:12px 0}

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(63,122,95,0.25);border-radius:4px}

.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.agent-card{display:flex;flex-direction:column;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow-sm)}
.agent-header{display:flex;align-items:flex-start;gap:10px}
.agent-icon{width:36px;height:36px;background:var(--primary-light);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--primary);flex-shrink:0}
.agent-name{font-size:14px;font-weight:700;color:var(--txt)}
.agent-tag{font-size:11px;color:var(--ok);font-weight:600}
.agent-desc{font-size:13px;color:var(--text-secondary,#6B5E52);line-height:1.55;margin:0}
.agent-solves{list-style:none;display:flex;flex-direction:column;gap:5px;flex:1;padding:0;margin:0}
.agent-solves li{font-size:12px;color:var(--muted);padding-left:14px;position:relative;line-height:1.45}
.agent-solves li::before{content:'→';position:absolute;left:0;color:var(--primary);font-weight:700}
.agent-intro{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:10px;padding:16px 20px;margin-bottom:20px}
.agent-intro-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:4px}
.agent-intro-sub{font-size:13px;color:var(--text-secondary);line-height:1.5}
.agent-status{margin-left:auto;background:var(--success-bg);color:var(--success);font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap}
.agent-scenario{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.agent-flow{display:flex;flex-direction:column;gap:6px;margin:8px 0;padding:10px 12px;background:var(--surface-2);border-radius:8px}
.flow-step{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text-secondary)}
.flow-dot{width:18px;height:18px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-top:1px}
.flow-dot.detect{background:#ECF3EF;color:#3F7A5F}
.flow-dot.analyze{background:var(--warning-bg);color:var(--warning)}
.flow-dot.act{background:var(--success-bg);color:var(--success)}
@media(max-width:480px){.agents-grid{grid-template-columns:1fr}.agent-header{flex-wrap:wrap;gap:8px}.agent-status{margin-left:0}.agent-card{padding:14px}.agent-flow{padding:8px 10px}.flow-step{font-size:11px}}

</head>

function nav(pg){
  curPg=pg;
  document.querySelectorAll('#snav a,#bnav .bn').forEach(el=>el.classList.remove('act'));

  const bnEl=document.querySelector(`#bn-${pg}`);if(bnEl)bnEl.classList.add('act');
  document.querySelectorAll('.pg').forEach(el=>el.classList.remove('show'));
  const pgEl=document.getElementById(`pg-${pg}`);if(pgEl)pgEl.classList.add('show');
  if(renders[pg])renders[pg]();
}

function renderPac(){
  const pg=document.getElementById('pg-pac');
  if(!pg)return;
  const q=((pg._q||'').toLowerCase());
  const allPets=S.pets||[];
  const list=allPets.filter(p=>{
    if(!p)return false;
    const o=ownerOf(p);
    return(p.name||'').toLowerCase().includes(q)||((o.name||'').toLowerCase().includes(q));
  });
  pg.innerHTML=`
  <div class="sec-head"><h2>Pacientes</h2><button class="btn btn-pri btn-sm" onclick="addPetModal()">+ Nueva mascota</button></div>
  <div class="search-bar"><input placeholder="Buscar mascota o dueño..." value="${pg._q||''}" oninput="document.getElementById('pg-pac')._q=this.value;renderPac()" style="max-width:300px"><span style="color:var(--muted);align-self:center">${list.length} resultados</span></div>
  <div class="card" style="padding:0;overflow:hidden">
  <table><thead><tr><th>Mascota</th><th>Dueño</th><th>Última visita</th><th>Próx. vacuna</th><th></th></tr></thead><tbody>
  ${list.length===0?`<tr><td colspan="5" class="empty">No se encontraron resultados</td></tr>`:''}
  ${list.map(p=>{
    const o=ownerOf(p);
    const td=today();
    const nextVac=(S.vacs||[]).filter(v=>v&&v.petId===p.id&&v.next&&v.next>=td).sort((a,b)=>a.next>b.next?1:-1)[0];
    const daysToVac=nextVac?Math.ceil((new Date(nextVac.next)-new Date())/864e5):null;
    return`<tr><td>${spIcon(p.sp)} <b>${p.name||'—'}</b><br><small style="color:var(--muted)">${p.breed||'—'} · ${age(p.dob)}</small></td>
    <td>${o.name||'—'}<br><small style="color:var(--muted)">${o.tel||''}</small></td>
    <td>${fmtDate(p.lastVisit)}</td>
    <td>${nextVac?`<span class="badge ${daysToVac<0?'b-err':daysToVac<=7?'b-warn':'b-ok'}">${nextVac.name} ${daysToVac<0?'vencida':daysToVac===0?'hoy':fmtDate(nextVac.next)}</span>`:'<span class="badge b-gray">—</span>'}</td>

  }).join('')}

}

function switchTab(el,show){
  if(!el||!el.parentNode)return;
  el.parentNode.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  el.classList.add('act');
  ['t-data','t-vac','t-hist'].forEach(id=>{const tabEl=document.getElementById(id);if(tabEl)tabEl.style.display='none';});
  const showEl=document.getElementById(show);if(showEl)showEl.style.display='';
}

function editPetModal(pid){closeModal();setTimeout(()=>addPetModal(pid),50);}
function savePet(e,pid){
  e.preventDefault();
  const f=new FormData(e.target);
  const d={name:f.get('name'),sp:f.get('sp'),breed:f.get('breed'),sex:f.get('sex'),color:f.get('color'),dob:f.get('dob'),weight:parseFloat(f.get('weight'))||0,chip:f.get('chip'),neut:f.get('neut')==='1',ownId:f.get('ownId'),allergies:f.get('allergies')};
  if(pid){const idx=S.pets.findIndex(p=>p.id===pid);if(idx>=0)Object.assign(S.pets[idx],d);}
  else{S.pets.push({id:'p'+uid(),lastVisit:'',nextVisit:'',...d});}
  save();closeModal();renderPac();
}
function deletePet(pid){
  const vacCount=(S.vacs||[]).filter(v=>v&&v.petId===pid).length;
  const consCount=(S.cons||[]).filter(c=>c&&c.petId===pid).length;
  if(vacCount>0||consCount>0){
    toast(`No se puede eliminar: tiene ${vacCount} vacuna${vacCount!==1?'s':''} y ${consCount} consulta${consCount!==1?'s':''} registradas.`,'warn');
    return;
  }
  if(!confirm('¿Eliminar esta mascota?'))return;
  S.pets=S.pets.filter(p=>p.id!==pid);save();closeModal();renderPac();
}

// Intervalos estándar por vacuna (días)
const VAC_INTERVALOS={'Séxtuple':365,'Quíntuple':365,'Rabia':365,'Bordetelosis':180,'Triple Felina':365,'Otra':365};
function vacIntervalo(name){return VAC_INTERVALOS[name]||365;}
function onVacNameChange(sel){
  if(!sel)return;
  const form=sel.closest('form');if(!form)return;
  const appliedInput=form.querySelector('[name=applied]');
  const nextInput=form.querySelector('[name=next]');
  const intervalInput=form.querySelector('[name=intervalo_dias]');
  const dias=VAC_INTERVALOS[sel.value]||365;
  if(intervalInput)intervalInput.value=dias;
  if(appliedInput&&nextInput)nextInput.value=addDays(appliedInput.value||today(),dias);
}
function onAppliedDateChange(inp){
  if(!inp)return;
  const form=inp.closest('form');if(!form)return;
  const nextInput=form.querySelector('[name=next]');
  const intervalInput=form.querySelector('[name=intervalo_dias]');
  const dias=parseInt(intervalInput&&intervalInput.value)||365;
  if(nextInput)nextInput.value=addDays(inp.value||today(),dias);
}
function addVacModal(pid){
  const p=petOf(pid);
  const plans={dog:['Séxtuple','Rabia','Bordetelosis','Quíntuple'],cat:['Triple Felina','Rabia']};
  const vacNames=(plans[p.sp]||['Séxtuple','Rabia']);
  const defaultName=vacNames[0];
  const defaultInterval=vacIntervalo(defaultName);
  const opts=vacNames.map(v=>`<option value="${v}">${v}</option>`).join('');
  openModal(`<h2>Nueva Vacuna — ${p.name} <button onclick="petModal('${pid}')" style="float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">←</button></h2>
  <form onsubmit="saveVac(event,'${pid}')">
  <div class="frow"><div><label>Vacuna</label><select name="name" onchange="onVacNameChange(this)">${opts}<option value="Otra">Otra</option></select></div><div><label>Laboratorio</label><input name="lab" placeholder="Ej: Zoetis"></div></div>
  <div class="frow"><div><label>Intervalo (días)</label><input type="number" name="intervalo_dias" value="${defaultInterval}" min="1" oninput="onAppliedDateChange(this.closest('form').querySelector('[name=applied]'))"></div><div><label>Fecha aplicada</label><input type="date" name="applied" value="${today()}" onchange="onAppliedDateChange(this)"></div></div>
  <div class="frow"><div><label>Próxima dosis (auto-calculada)</label><input type="date" name="next" value="${addDays(today(),defaultInterval)}"></div></div>
  <div class="modal-foot"><button type="button" class="btn btn-ghost" onclick="petModal('${pid}')">Cancelar</button><button type="submit" class="btn btn-acc">Guardar</button></div>
  </form>`);
}
function saveVac(e,pid){
  e.preventDefault();const f=new FormData(e.target);
  const applied=f.get('applied')||today();
  const intervalo=parseInt(f.get('intervalo_dias'))||365;
  const next=f.get('next')||addDays(applied,intervalo);
  S.vacs.push({id:'vc'+uid(),petId:pid,name:f.get('name'),applied,next,lab:f.get('lab')||'',intervalo_dias:intervalo});
  save();petModal(pid);
}
function applyVac(vid){
  const v=S.vacs.find(x=>x.id===vid);if(!v)return;
  const dias=v.intervalo_dias||vacIntervalo(v.name)||365;
  const newNext=addDays(today(),dias);
  if(!confirm(`Marcar ${v.name} como aplicada hoy? Próxima: ${fmtDate(newNext)} (intervalo: ${dias} días)`))return;
  v.applied=today();v.next=newNext;save();petModal(v.petId);
}
function printCarnet(pid){
  const p=petOf(pid);const o=ownerOf(p);
  const pvacs=(S.vacs||[]).filter(v=>v&&v.petId===pid);
  const win=window.open('','_blank');
  if(!win)return;
  win.document.write(`<html><head><title>Carnet ${p.name}</title><style>body{font-family:sans-serif;padding:20px;color:#000}h1{font-size:18px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ccc;padding:6px;font-size:12px}</style></head><body>
  <h1>🐾 Carnet Sanitario — ${p.name}</h1><p><b>Especie:</b> ${p.sp} | <b>Raza:</b> ${p.breed||'—'} | <b>Sexo:</b> ${p.sex} | <b>Nac:</b> ${fmtDate(p.dob)}</p>
  <p><b>Dueño:</b> ${o.name||'—'} | <b>Tel:</b> ${o.tel||'—'}</p>
  ${p.allergies?`<p style="color:red"><b>ALERGIAS:</b> ${p.allergies}</p>`:''}
  <h2>Vacunas</h2><table><tr><th>Vacuna</th><th>Aplicada</th><th>Próxima</th><th>Lab</th></tr>
  ${pvacs.map(v=>`<tr><td>${v.name||'—'}</td><td>${fmtDate(v.applied)}</td><td>${fmtDate(v.next)}</td><td>${v.lab||'—'}</td></tr>`).join('')}

function addSvc(){
  const c=document.getElementById('svc-list');
  if(!c)return;
  const medOpts=(S.meds||[]).map(m=>`<option value="${m.name}" data-price="${m.price}" data-id="${m.id}">${m.name} (stock: ${m.stock||0})</option>`).join('');
  const row=document.createElement('div');row.className='frow';row.style.marginBottom='6px';
  row.innerHTML=`<div style="display:flex;flex-direction:column;gap:4px;flex:1"><input placeholder="Servicio o descripción" name="svc_name"><select name="svc_med_id" style="font-size:12px;margin-top:2px" onchange="onMedSelect(this)"><option value="">— Vincular medicamento (descuenta stock) —</option>${medOpts}</select></div><input type="number" placeholder="Precio" name="svc_price" oninput="calcTotal()" style="max-width:120px"><button type="button" onclick="this.parentNode.remove();calcTotal()" class="btn btn-err btn-sm" style="max-width:40px">✕</button>`;
  c.appendChild(row);
}
function onMedSelect(sel){
  if(!sel)return;
  const opt=sel.options[sel.selectedIndex];
  const row=sel.closest('.frow');if(!row)return;
  if(!opt||!opt.value)return;
  const nameInput=row.querySelector('[name=svc_name]');
  const priceInput=row.querySelector('[name=svc_price]');
  if(nameInput&&!nameInput.value)nameInput.value=opt.value;
  if(priceInput&&!priceInput.value){priceInput.value=opt.dataset.price||'';calcTotal();}
}
function calcTotal(){
  const prices=[...document.querySelectorAll('[name=svc_price]')].map(i=>parseFloat(i.value)||0);
  const totalEl=document.getElementById('svc-total');
  if(totalEl)totalEl.textContent=prices.reduce((a,b)=>a+b,0).toLocaleString('es-AR');
}
function saveCons(e){
  e.preventDefault();const f=new FormData(e.target);
  const names=[...document.querySelectorAll('[name=svc_name]')].map(i=>i.value).filter(Boolean);
  const prices=[...document.querySelectorAll('[name=svc_price]')].map(i=>parseFloat(i.value)||0);
  const medIds=[...document.querySelectorAll('[name=svc_med_id]')].map(i=>i.value);
  const services=names.map((n,i)=>({name:n,price:prices[i]||0,medId:medIds[i]||''}));
  const total=prices.reduce((a,b)=>a+b,0);
  const pid=f.get('petId');const vid=f.get('vetId');
  const c={id:'c'+uid(),petId:pid,vetId:vid,date:f.get('date')||today(),motivo:f.get('motivo'),temp:f.get('temp'),fc:f.get('fc'),weight:parseFloat(f.get('weight'))||0,diag:f.get('diag'),trat:f.get('trat'),services,total,notes:''};
  S.cons.push(c);
  const pt=S.pets.find(p=>p.id===pid);if(pt)pt.lastVisit=c.date;
  services.forEach(svc=>{
    if(svc.medId){
      const med=S.meds.find(m=>m.id===svc.medId);
      if(med&&med.stock>0){med.stock=Math.max(0,med.stock-1);}
    }
  });
  if(total>0)S.cash.push({id:'ca'+uid(),date:c.date,type:'Consulta',desc:`${petOf(pid).name} - ${c.motivo}`,amount:total,vetId:vid,cat:'income'});
  save();closeModal();renderCons();
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
function getNotificaciones(){
  const todayStr=today();
  const notifs=[];
  (S.vacs||[]).forEach(v=>{
    if(!v||!v.next)return;
    const p=petOf(v.petId);
    if(v.next<=todayStr){
      notifs.push({msg:`💉 Vacuna ${v.name||'—'} vencida: ${p.name||'—'}`,tipo:'vacuna'});
    } else if(v.next>todayStr&&v.next<=addDays(todayStr,7)){
      notifs.push({msg:`⚠ Vacuna ${v.name||'—'} próxima: ${p.name||'—'}`,tipo:'vacuna'});
    }
  });
  const pendToday=(S.appts||[]).filter(a=>a&&a.date===todayStr&&a.status==='pendiente');
  if(pendToday.length>0){
    notifs.push({msg:`📅 ${pendToday.length} turno${pendToday.length!==1?'s':''} pendiente${pendToday.length!==1?'s':''} hoy`,tipo:'turno'});
  }
  return notifs;
}
function renderNotifBadge(){
  const notifs=getNotificaciones();
  const vacCount=notifs.filter(n=>n.tipo==='vacuna').length;
  const turnCount=notifs.filter(n=>n.tipo==='turno').length;
  // Limpiar badges existentes en sidebar y bottom nav
  ['sn-vac','sn-turn','bn-vac','bn-turn'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    const existing=el.querySelector('.notif-badge');
    if(existing)existing.remove();
  });
  // Agregar badges de vacunas
  if(vacCount>0){
    ['sn-vac','bn-vac'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){const b=document.createElement('span');b.className='notif-badge';b.textContent=vacCount;el.appendChild(b);}
    });
  }
  // Agregar badges de turnos
  if(turnCount>0){
    ['sn-turn','bn-turn'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){const b=document.createElement('span');b.className='notif-badge';b.textContent=turnCount;el.appendChild(b);}
    });
  }
  const panel=document.getElementById('alertas-panel');
  if(!panel)return;
  if(notifs.length===0){panel.innerHTML='';return;}
  panel.innerHTML=notifs.map(n=>`<div class="alert ${n.tipo==='vacuna'?'alert-warn':'alert-err'}">${n.msg}</div>`).join('');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg,type='info'){
  let t=document.getElementById('vet-toast');
  if(!t){t=document.createElement('div');t.id='vet-toast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1E3A5F;border:1px solid var(--brd);border-radius:10px;padding:12px 20px;font-size:13px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;color:#fff;';document.body.appendChild(t);}
  t.textContent=msg||'';
  t.style.borderColor=type==='warn'?'rgba(245,158,11,.5)':type==='error'?'rgba(239,68,68,.5)':'rgba(16,185,129,.5)';
  t.style.color=type==='warn'?'#F59E0B':type==='error'?'#EF4444':'#10B981';
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(-50%) translateY(20px)';},3500);
}

// ─── REPORTE MENSUAL ──────────────────────────────────────────────────────────
function reporteMensual(){
  if(typeof XLSX==='undefined'){alert('La librería XLSX no está cargada.');return;}
  const todayStr=today();
  const mes=prompt('Mes a exportar (YYYY-MM):',todayStr.slice(0,7));
  if(!mes)return;
  const cons=(S.cons||[]).filter(c=>c&&c.date&&c.date.startsWith(mes));
  const cash=(S.cash||[]).filter(c=>c&&c.date&&c.date.startsWith(mes));
  const consRows=cons.map(c=>{
    const p=(S.pets||[]).find(x=>x.id===c.petId)||{name:'—'};
    return{Fecha:fmtDate(c.date),Paciente:p.name,Motivo:c.motivo||'—',Total:parseFloat(c.total)||0};
  });
  const totalIngresos=cash.filter(c=>c.cat==='income').reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const totalGastos=cash.filter(c=>c.cat==='expense').reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const resumenRows=[
    {'Concepto':'Total ingresos','Valor':totalIngresos},
    {'Concepto':'Total gastos','Valor':totalGastos},
    {'Concepto':'Neto','Valor':totalIngresos-totalGastos},
    {'Concepto':'N° consultas','Valor':cons.length}
  ];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(consRows.length?consRows:[{Fecha:'Sin datos',Paciente:'',Motivo:'',Total:0}]),'Consultas');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(resumenRows),'Resumen');
  XLSX.writeFile(wb,`reporte-vet-${mes}.xlsx`);
}

function deleteVet(vid){

    toast(`No se puede eliminar: tiene ${consCount} consulta${consCount!==1?'s':''} registradas.`,'error');

  S.vets=S.vets.filter(v=>v.id!==vid);save();closeModal();
}

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

}

// ─── DUEÑOS ───────────────────────────────────────────────────────────────────
function renderDuenos(){
  const pg=document.getElementById('pg-duenos');
  if(!pg)return;
  const q=((pg._q||'').toLowerCase());
  const allOwners=S.owners||[];
  const list=allOwners.filter(o=>{
    if(!o)return false;
    return(o.name||'').toLowerCase().includes(q)||(o.tel||'').toLowerCase().includes(q)||(o.email||'').toLowerCase().includes(q);
  });
  // KPIs
  const totalDuenos=allOwners.length;
  const mascotasPorDueno=allOwners.map(o=>(S.pets||[]).filter(p=>p&&p.ownId===o.id).length);
  const promMascotas=totalDuenos>0?(mascotasPorDueno.reduce((a,b)=>a+b,0)/totalDuenos).toFixed(1):0;
  const dueniosConMascotas=allOwners.filter(o=>(S.pets||[]).some(p=>p&&p.ownId===o.id)).length;
  pg.innerHTML=`
  <div class="sec-head"><h2>Dueños</h2><button class="btn btn-pri btn-sm" onclick="addDuenoModal()">+ Nuevo dueño</button></div>
  <div class="row">
    <div class="kpi"><div class="val">${totalDuenos}</div><div class="lbl">Total dueños</div></div>
    <div class="kpi acc"><div class="val">${promMascotas}</div><div class="lbl">Mascotas prom. por dueño</div></div>
    <div class="kpi warn"><div class="val">${dueniosConMascotas}</div><div class="lbl">Con mascotas activas</div></div>
  </div>
  <div class="search-bar"><input placeholder="Buscar por nombre, teléfono o email..." value="${pg._q||''}" oninput="document.getElementById('pg-duenos')._q=this.value;renderDuenos()" style="max-width:340px"><span style="color:var(--muted);align-self:center">${list.length} resultado${list.length!==1?'s':''}</span></div>
  <div class="card" style="padding:0;overflow:hidden">
  <table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Mascotas</th><th>Acciones</th></tr></thead><tbody>
  ${list.length===0?`<tr><td colspan="5" class="empty">No se encontraron resultados</td></tr>`:''}
  ${list.map(o=>{
    const mascotas=(S.pets||[]).filter(p=>p&&p.ownId===o.id);
    return`<tr>
      <td><b>${o.name||'—'}</b></td>
      <td>${o.tel||'—'}</td>
      <td><a href="mailto:${o.email||''}" style="color:var(--pri)">${o.email||'—'}</a></td>
      <td>${mascotas.length>0?mascotas.map(p=>`<span class="chip">${spIcon(p.sp)} ${p.name}</span>`).join(' '):'<span class="badge b-gray">Sin mascotas</span>'}</td>
      <td style="display:flex;gap:4px">
        ${o.tel?`<a href="https://wa.me/${telWA(o.tel)}" target="_blank" class="btn btn-wa btn-sm">WA</a>`:''}
        <button class="btn btn-ghost btn-sm" onclick="editDuenoModal('${o.id}')">Editar</button>
        <button class="btn btn-err btn-sm" onclick="deleteDueno('${o.id}')">Eliminar</button>
      </td></tr>`;
  }).join('')}
  </tbody></table></div>`;
}

function addDuenoModal(oid){
  const o=oid?(S.owners||[]).find(x=>x.id===oid)||{}:{};
  const editing=!!oid;
  openModal(`<h2>${editing?'Editar':'Nuevo'} Dueño <button onclick="closeModal()" style="float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button></h2>
  <form onsubmit="saveDueno(event,'${oid||''}')">
  <div class="frow full"><label>Nombre completo*</label><input name="name" required value="${o.name||''}"></div>
  <div class="frow"><div><label>Teléfono</label><input name="tel" placeholder="11-2345-6789" value="${o.tel||''}"></div><div><label>Email</label><input type="email" name="email" value="${o.email||''}"></div></div>
  <div class="modal-foot"><button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button type="submit" class="btn btn-pri">${editing?'Guardar':'Agregar'}</button></div>
  </form>`);
}
function editDuenoModal(oid){addDuenoModal(oid);}
function saveDueno(e,oid){
  e.preventDefault();const f=new FormData(e.target);
  const d={name:f.get('name'),tel:f.get('tel')||'',email:f.get('email')||''};
  if(oid){const idx=(S.owners||[]).findIndex(o=>o.id===oid);if(idx>=0)Object.assign(S.owners[idx],d);}
  else{if(!S.owners)S.owners=[];S.owners.push({id:'o'+uid(),...d});}
  save();closeModal();renderDuenos();
}
function deleteDueno(oid){
  const mascotas=(S.pets||[]).filter(p=>p&&p.ownId===oid);
  if(mascotas.length>0){
    toast(`No se puede eliminar: tiene ${mascotas.length} mascota${mascotas.length!==1?'s':''} asociada${mascotas.length!==1?'s':''}.`,'warn');
    return;
  }
  if(!confirm('¿Eliminar este dueño?'))return;
  S.owners=(S.owners||[]).filter(o=>o.id!==oid);save();renderDuenos();
}

// ─── CAJA (página dedicada) ────────────────────────────────────────────────────
function renderCaja(){
  const pg=document.getElementById('pg-caja');
  if(!pg)return;
  // Reutilizamos renderFarm con tab caja, o renderizamos directo
  const fd=pg._fdate||today();
  const income=(S.cash||[]).filter(c=>c&&c.date===fd&&c.cat==='income');
  const expenses=(S.cash||[]).filter(c=>c&&c.date===fd&&c.cat==='expense');
  const totalIn=income.reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const totalEx=expenses.reduce((s,c)=>s+(parseFloat(c.amount)||0),0);
  const neto=totalIn-totalEx;
  const byType={};income.forEach(c=>{if(c.type)byType[c.type]=(byType[c.type]||0)+(parseFloat(c.amount)||0);});
  const byVet={};income.forEach(c=>{if(c.vetId){const vn=vetOf(c.vetId).name;byVet[vn]=(byVet[vn]||0)+(parseFloat(c.amount)||0);}});
  pg.innerHTML=`
  <div class="sec-head"><h2>Caja</h2><button class="btn btn-pri btn-sm" onclick="addCashModal()">+ Movimiento</button></div>
  <div class="search-bar"><input type="date" value="${fd}" onchange="document.getElementById('pg-caja')._fdate=this.value;renderCaja()"></div>
  <div class="row">
    <div class="kpi acc"><div class="val">${fmtARS(totalIn)}</div><div class="lbl">Ingresos</div></div>
    <div class="kpi warn"><div class="val">${fmtARS(totalEx)}</div><div class="lbl">Gastos</div></div>
    <div class="kpi"><div class="val" style="color:${neto>=0?'var(--ok)':'var(--err)'}">${fmtARS(neto)}</div><div class="lbl">Neto del día</div></div>
  </div>
  <div class="row">
    <div class="card" style="flex:1;min-width:200px"><h3>Por tipo</h3>
      ${Object.entries(byType).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--brd)"><span>${k}</span><span style="color:var(--acc)">${fmtARS(v)}</span></div>`).join('')||'<div class="empty">Sin datos</div>'}
    </div>
    <div class="card" style="flex:1;min-width:200px"><h3>Por veterinario</h3>
      ${Object.entries(byVet).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--brd)"><span>${k}</span><span style="color:var(--acc)">${fmtARS(v)}</span></div>`).join('')||'<div class="empty">Sin datos</div>'}
    </div>
  </div>
  <div class="sec-head"><h3>Movimientos del día</h3><button class="btn btn-ghost btn-sm" onclick="reporteMensual()">Reporte Mensual</button></div>
  <div class="card" style="padding:0;overflow-x:auto"><table style="min-width:520px"><thead><tr><th>Tipo</th><th>Descripción</th><th>Monto</th><th>Cat.</th></tr></thead><tbody>
  ${[...income,...expenses].length===0?`<tr><td colspan="4" class="empty">Sin movimientos</td></tr>`:''}
  ${[...income,...expenses].map(c=>`<tr><td>${c.type||'—'}</td><td>${c.desc||'—'}</td><td><span style="color:${c.cat==='income'?'var(--ok)':'var(--err)'}">${c.cat==='income'?'+':'-'}${fmtARS(c.amount)}</span></td><td><span class="badge ${c.cat==='income'?'b-ok':'b-err'}">${c.cat==='income'?'Ingreso':'Gasto'}</span></td></tr>`).join('')}
  </tbody></table></div>`;
}
